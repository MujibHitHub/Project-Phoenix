<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Phoenix | Dashboard</title>
    <link rel="stylesheet" href="styles/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Spline Viewer module script for 3D interactive background -->
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.82/build/spline-viewer.js"></script>
</head>

<body>
    <!-- 3D Spline Background -->
    <div class="spline-container">
        <spline-viewer id="splineScene" url="https://prod.spline.design/6Wq1Q7YTyMZO1gTh/scene.splinecode"></spline-viewer>
    </div>

    <!-- Suspense Fallback Loader Screen -->
    <div id="pageLoader" class="page-loader">
        <div class="loader-content">
            <span class="loader"></span>
            <p>Initializing Dashboard...</p>
        </div>
    </div>

    <div class="dashboard-container">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="brand-section">
                <div class="logo-icon"></div>
                <h1>Project Phoenix</h1>
            </div>
            <div class="user-section">
                <span class="welcome-text">Welcome, <strong id="username">User</strong></span>
                <button class="btn-logout" id="logoutBtn">Logout</button>
            </div>
        </header>

        <!-- Start New Session Buttons -->
        <section class="action-section">
            <button class="btn-start-session" id="startSessionBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 5v14M5 12h14" />
                </svg>
                Task Selection
            </button>
            <button class="btn-start-session btn-full-test" id="startFullTestBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
                Start Full Test
            </button>
        </section>

        <!-- Score Chart Section -->
        <section class="chart-section">
            <h2>📊 Score Progress</h2>
            <div class="chart-container">
                <canvas id="scoreChart"></canvas>
            </div>
            <div class="chart-legend">
                <div class="legend-item" style="color: #077F83;">
                    <span class="legend-dot" style="background: #077F83;"></span>
                    <span>Email Tasks</span>
                </div>
                <div class="legend-item" style="color: #2B8084;">
                    <span class="legend-dot" style="background: #2B8084;"></span>
                    <span>Academic Discussion</span>
                </div>
                <div class="legend-item" style="color: #FFC107;">
                    <span class="legend-dot" style="background: #FFC107;"></span>
                    <span>Full Tests</span>
                </div>
            </div>
        </section>

        <!-- Progress Tracker Section -->
        <section class="progress-section" id="progressSection">
            <h2>📝 Session History</h2>
            <div class="filter-controls">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="email">Email</button>
                <button class="filter-btn" data-filter="academic">Academic Discussion</button>
                <button class="filter-btn" data-filter="full-test">Full Test</button>
            </div>
            <div id="sessionsList" class="sessions-list">
                <!-- Sessions will be dynamically loaded here -->
                <div class="empty-state">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    <p>No sessions yet</p>
                    <span>Click "Task Selection" or "Start Full Test" to begin your practice!</span>
                </div>
            </div>
        </section>
    </div>

    <!-- Generation Loading Overlay -->
    <div id="generationOverlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(9, 13, 22, 0.95); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; color: white; backdrop-filter: blur(20px);">
        <div class="loader" style="margin-bottom: 24px;"></div>
        <h2 id="genStatus" style="font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px;">Generating AI Scenarios...</h2>
        <p style="opacity: 0.7; font-size: 14px; font-weight: 500;">Preparing your personalized TOEFL Full Test</p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        if (!PhoenixAuth.requireAuth()) {
            throw new Error('Auth required');
        }

        const currentUser = localStorage.getItem('currentUser') || localStorage.getItem('username') || 'User';
        document.getElementById('username').textContent = currentUser;

        // Loader Screen Transition
        const spline = document.getElementById('splineScene');
        const pageLoader = document.getElementById('pageLoader');
        
        if (spline) {
            spline.addEventListener('load', () => {
                pageLoader.classList.add('fade-out');
                setTimeout(() => {
                    pageLoader.style.display = 'none';
                }, 500);
            });
        }

        // Safety timeout to hide loader if Spline takes too long
        setTimeout(() => {
            if (pageLoader && pageLoader.style.display !== 'none') {
                pageLoader.classList.add('fade-out');
                setTimeout(() => {
                    pageLoader.style.display = 'none';
                }, 500);
            }
        }, 4000);

        let sessionsData = [];
        let scoreChart = null;

        // Logout functionality (clearing both username key variants)
        document.getElementById('logoutBtn').addEventListener('click', () => {
            PhoenixAuth.clearAuthSession();
            window.location.href = 'login.html';
        });

        // Start New Session
        document.getElementById('startSessionBtn').addEventListener('click', () => {
            window.location.href = 'task-selection.html';
        });

        // Start Full Test
        document.getElementById('startFullTestBtn').addEventListener('click', async () => {
            const overlay = document.getElementById('generationOverlay');
            overlay.style.display = 'flex';

            try {
                // Generate fresh scenarios for both tasks (with cache-busting)
                const timestamp = new Date().getTime();
                const authHeaders = PhoenixAuth.getAuthHeaders();
                const [emailRes, acadRes] = await Promise.all([
                    fetch(`/api/scenarios/generate-ai?type=email&t=${timestamp}`, { headers: authHeaders }).then(r => r.json()),
                    fetch(`/api/scenarios/generate-ai?type=academic&t=${timestamp}`, { headers: authHeaders }).then(r => r.json())
                ]);

                if (emailRes.success && acadRes.success) {
                    // Store pre-generated scenarios
                    sessionStorage.setItem('fullTest_email_scenario', emailRes.scenario);
                    sessionStorage.setItem('fullTest_academic_scenario', acadRes.scenario);

                    window.location.href = 'full-test.html';
                } else {
                    const errorMsg = (emailRes.message || acadRes.message || "Unknown error");
                    throw new Error(errorMsg);
                }
            } catch (err) {
                console.error("Test setup failed:", err);
                alert("Failed to prepare AI scenarios: " + err.message);
                overlay.style.display = 'none';
            }
        });

        // Load user sessions
        async function loadSessions() {
            try {
                const response = await fetch('/api/sessions', {
                    headers: PhoenixAuth.getAuthHeaders()
                });
                const data = await response.json();

                if (data.success) {
                    sessionsData = data.sessions;
                    renderSessions(sessionsData);
                    renderChart(sessionsData);
                }
            } catch (error) {
                console.error('Failed to load sessions:', error);
            }
        }

        // Render sessions list
        function renderSessions(sessions, filter = 'all') {
            const sessionsList = document.getElementById('sessionsList');

            const filteredSessions = filter === 'all'
                ? sessions
                : sessions.filter(s => s.taskType === filter);

            if (filteredSessions.length === 0) {
                sessionsList.innerHTML = `
                    <div class="empty-state">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        <p>No sessions found</p>
                        <span>${filter === 'all' ? 'Start practicing to see your progress here!' : `No ${filter} sessions yet.`}</span>
                    </div>
                `;
                return;
            }

            sessionsList.innerHTML = filteredSessions.map((session, index) => {
                const isFullTest = session.taskType === 'full-test';
                let icon = session.taskType === 'email' ? '✉️' : '💬';
                let title = session.taskType === 'email' ? 'Email Task' : 'Academic Discussion';
                if (isFullTest) {
                    icon = '🏆';
                    title = 'Full Test';
                }

                // For full test, we use the average breakdown or show both
                const feedback = isFullTest ? session.details.email : session.feedback;

                return `
                <div class="session-card" data-session-id="${session.id}" id="session-${session.id}">
                    <div class="session-header">
                        <div class="session-info">
                            <h3>
                                <span class="session-badge ${session.taskType}">${icon}</span>
                                ${title}
                            </h3>
                            <span class="session-date">${new Date(session.date).toLocaleDateString()}</span>
                        </div>
                        <div class="session-score">
                            <div class="score-value">${session.score}<span>/100</span></div>
                            <div class="score-stars">${getStars(session.score)}</div>
                        </div>
                    </div>
                    ${!isFullTest ? `
                    <div class="session-breakdown">
                        <div class="breakdown-item">
                            <span>Task Achievement</span>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${(feedback.breakdown.taskAchievement / 25) * 100}%"></div>
                                <span class="progress-value">${feedback.breakdown.taskAchievement}/25</span>
                            </div>
                        </div>
                        <div class="breakdown-item">
                            <span>Organization</span>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${(feedback.breakdown.organization / 25) * 100}%"></div>
                                <span class="progress-value">${feedback.breakdown.organization}/25</span>
                            </div>
                        </div>
                        <div class="breakdown-item">
                            <span>Language Use</span>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${(feedback.breakdown.languageUse / 25) * 100}%"></div>
                                <span class="progress-value">${feedback.breakdown.languageUse}/25</span>
                            </div>
                        </div>
                        <div class="breakdown-item">
                            <span>Grammar</span>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${(feedback.breakdown.grammar / 25) * 100}%"></div>
                                <span class="progress-value">${feedback.breakdown.grammar}/25</span>
                            </div>
                        </div>
                    </div>
                    ` : `
                    <div class="full-test-mini-report" style="margin: 10px 0; color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;">
                        <p>Includes Email Task (${session.details.email.overallScore}/100) and Academic Discussion (${session.details.academic.overallScore}/100).</p>
                    </div>
                    `}
                    <button class="btn-expand" onclick="toggleFeedback('${session.id}')">
                        <span class="expand-text">View Detailed Feedback</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <div class="session-feedback" id="feedback-${session.id}">
                        ${isFullTest ? `
                            <div class="feedback-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                <div class="feedback-section">
                                    <h4>📧 Email Task</h4>
                                    <p>${session.details.email.detailedFeedback}</p>
                                </div>
                                <div class="feedback-section">
                                    <h4>💬 Academic Discussion</h4>
                                    <p>${session.details.academic.detailedFeedback}</p>
                                </div>
                            </div>
                        ` : `
                            <div class="feedback-section strengths">
                                <h4>✅ Strengths</h4>
                                <ul>
                                    ${session.feedback.strengths.map(s => `<li>${s}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="feedback-section improvements">
                                <h4>📝 Areas for Improvement</h4>
                                <ul>
                                    ${session.feedback.improvements.map(i => `<li>${i}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="feedback-section">
                                <h4>💬 Detailed Feedback</h4>
                                <p>${session.feedback.detailedFeedback}</p>
                            </div>
                        `}
                    </div>
                </div>
                `;
            }).join('');
        }

        // Toggle feedback visibility
        function toggleFeedback(sessionId) {
            const feedbackEl = document.getElementById(`feedback-${sessionId}`);
            const btn = feedbackEl.previousElementSibling;
            const isExpanded = feedbackEl.classList.contains('expanded');

            if (isExpanded) {
                feedbackEl.classList.remove('expanded');
                btn.querySelector('.expand-text').textContent = 'View Detailed Feedback';
                btn.querySelector('svg').style.transform = 'rotate(0deg)';
            } else {
                feedbackEl.classList.add('expanded');
                btn.querySelector('.expand-text').textContent = 'Hide Detailed Feedback';
                btn.querySelector('svg').style.transform = 'rotate(180deg)';
            }
        }

        // Get star rating
        function getStars(score) {
            const stars = Math.round(score / 20);
            return '⭐'.repeat(stars) + '☆'.repeat(5 - stars);
        }

        // Render chart
        function renderChart(sessions) {
            const ctx = document.getElementById('scoreChart');

            if (sessions.length === 0) {
                ctx.parentElement.innerHTML = '<p class="no-data">Complete sessions to see your progress chart</p>';
                return;
            }

            const labels = sessions.map((_, i) => `Session ${i + 1}`);

            if (scoreChart) {
                scoreChart.destroy();
            }

            // Chart styling for premium glass theme
            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = "'Inter', sans-serif";
            Chart.defaults.font.weight = '500';

            scoreChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Email Tasks',
                            data: sessions.map(s => s.taskType === 'email' ? s.score : null),
                            borderColor: '#077F83',
                            backgroundColor: 'rgba(7, 127, 131, 0.15)',
                            tension: 0.4,
                            fill: true,
                            pointRadius: 6,
                            pointHoverRadius: 8,
                            pointBackgroundColor: '#077F83',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            spanGaps: true
                        },
                        {
                            label: 'Academic Discussion',
                            data: sessions.map(s => s.taskType === 'academic' ? s.score : null),
                            borderColor: '#2B8084',
                            backgroundColor: 'rgba(43, 128, 132, 0.15)',
                            tension: 0.4,
                            fill: true,
                            pointRadius: 6,
                            pointHoverRadius: 8,
                            pointBackgroundColor: '#2B8084',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            spanGaps: true
                        },
                        {
                            label: 'Full Tests',
                            data: sessions.map(s => s.taskType === 'full-test' ? s.score : null),
                            borderColor: '#FFC107',
                            backgroundColor: 'rgba(255, 193, 7, 0.1)',
                            tension: 0.4,
                            fill: false,
                            pointRadius: 8,
                            pointHoverRadius: 10,
                            pointBackgroundColor: '#FFC107',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2.5,
                            borderDash: [5, 5],
                            spanGaps: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    onClick: (event, elements) => {
                        if (elements.length > 0) {
                            const index = elements[0].index;
                            scrollToSession(sessions[index].id);
                        }
                    },
                    plugins: {
                        legend: {
                            display: false // We use our own premium HTML legend
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleColor: '#fff',
                            bodyColor: '#e2e8f0',
                            borderColor: 'rgba(255,255,255,0.1)',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: true,
                            boxPadding: 6,
                            cornerRadius: 8,
                            titleFont: { weight: 'bold' }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#94a3b8',
                                padding: 10
                            }
                        },
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#94a3b8',
                                padding: 10
                            }
                        }
                    }
                }
            });
        }

        // Scroll to session card
        function scrollToSession(sessionId) {
            const sessionCard = document.getElementById(`session-${sessionId}`);
            if (sessionCard) {
                sessionCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                sessionCard.classList.add('highlight');
                setTimeout(() => sessionCard.classList.remove('highlight'), 2000);
            }
        }

        // Filter buttons click handler
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.dataset.filter;
                renderSessions(sessionsData, filter);
            });
        });

        // Initial sessions fetch on page load
        loadSessions();
    </script>
</body>

</html>
