<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL writing Trainer - Full Test Mode</title>
    <link rel="stylesheet" href="styles/full-test.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="test-container" class="test-container">
        <!-- The test steps will be loaded here dynamically -->
        <div id="content-frame-wrapper">
            <iframe id="test-iframe" src="about:blank"></iframe>
        </div>

        <!-- Progress Overlay (Subtle) -->
        <div class="test-progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        if (!PhoenixAuth.requireAuth()) {
            throw new Error('Auth required');
        }
    </script>
    <script src="full-test.js"></script>
</body>

</html>
