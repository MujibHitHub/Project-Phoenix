<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Phoenix | Login</title>
    <link rel="stylesheet" href="styles/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Spline Viewer module script for 3D interactive background -->
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.82/build/spline-viewer.js"></script>
</head>

<body>
    <!-- 3D Spline Background -->
    <div class="spline-container">
        <spline-viewer id="splineScene" url="https://prod.spline.design/cAPscU-MuxjN26r7/scene.splinecode"></spline-viewer>
    </div>

    <!-- Suspense Fallback Loader Screen -->
    <div id="pageLoader" class="page-loader">
        <div class="loader-content">
            <span class="loader"></span>
            <p>Initializing 3D environment...</p>
        </div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="brand-logo">
                <div class="logo-icon"></div>
                <h1 id="formTitle">Sign In</h1>
            </div>

            <form id="authForm">
                <div class="input-group">
                    <label for="username">Email</label>
                    <input type="email" id="username" name="username" required placeholder="Enter your email"
                        minlength="3">
                    <span class="input-hint" id="usernameHint"></span>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password"
                        minlength="6">
                    <span class="input-hint" id="passwordHint"></span>
                </div>

                <div class="actions">
                    <button type="submit" class="btn-primary" id="submitBtn">Sign In</button>
                </div>

                <div id="message" class="message"></div>
            </form>

            <div class="divider"><span>or</span></div>

            <div class="oauth-buttons">
                <button type="button" class="btn-oauth google-btn" onclick="window.location.href='/api/auth/login-google'">
                    <svg width="18" height="18" viewBox="0 0 48 48" style="display: block;">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.5 24c0-1.61-.15-3.16-.42-4.69H24v8.89h12.62c-.54 2.85-2.15 5.27-4.57 6.9l7.1 5.51C43.37 36.69 46.5 30.85 46.5 24z"/>
                        <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.1-5.51c-1.97 1.33-4.49 2.12-8.79 2.12-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    </svg>
                    <span>Sign in with Google</span>
                </button>
            </div>

            <p class="switch-mode">
                <span id="switchText">New here?</span>
                <a href="#" id="toggleMode">Create an account</a>
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const authForm = document.getElementById('authForm');
        const messageEl = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const formTitle = document.getElementById('formTitle');
        const toggleModeLink = document.getElementById('toggleMode');
        const switchText = document.getElementById('switchText');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const usernameHint = document.getElementById('usernameHint');
        const passwordHint = document.getElementById('passwordHint');

        // Loader Screen Transition
        const spline = document.getElementById('splineScene');
        const pageLoader = document.getElementById('pageLoader');
        
        if (spline) {
            spline.addEventListener('load', () => {
                pageLoader.classList.add('fade-out');
                setTimeout(() => {
                    pageLoader.style.display = 'none';
                }, 500);
            });
        }

        // Safety timeout to hide loader if Spline takes too long
        setTimeout(() => {
            if (pageLoader && pageLoader.style.display !== 'none') {
                pageLoader.classList.add('fade-out');
                setTimeout(() => {
                    pageLoader.style.display = 'none';
                }, 500);
            }
        }, 4000);

        // Handle OAuth callback tokens if present
        if (PhoenixAuth.handleOAuthCallbackFromUrl()) {
            // Redirecting to dashboard
        }

        let isSignUpMode = false;

        // Toggle between Sign In and Sign Up modes
        toggleModeLink.addEventListener('click', (e) => {
            e.preventDefault();
            isSignUpMode = !isSignUpMode;

            if (isSignUpMode) {
                formTitle.textContent = 'Create Account';
                submitBtn.textContent = 'Sign Up';
                switchText.textContent = 'Already have an account?';
                toggleModeLink.textContent = 'Sign in';
            } else {
                formTitle.textContent = 'Sign In';
                submitBtn.textContent = 'Sign In';
                switchText.textContent = 'New here?';
                toggleModeLink.textContent = 'Create an account';
            }

            // Clear form and messages
            authForm.reset();
            messageEl.textContent = '';
            messageEl.className = 'message';
            usernameHint.textContent = '';
            passwordHint.textContent = '';
        });

        // Input validation hints
        usernameInput.addEventListener('input', () => {
            if (isSignUpMode && usernameInput.value.length > 0 && usernameInput.value.length < 3) {
                usernameHint.textContent = 'Username must be at least 3 characters';
                usernameHint.style.color = '#f87171';
            } else {
                usernameHint.textContent = '';
            }
        });

        passwordInput.addEventListener('input', () => {
            if (isSignUpMode && passwordInput.value.length > 0 && passwordInput.value.length < 6) {
                passwordHint.textContent = 'Password must be at least 6 characters';
                passwordHint.style.color = '#f87171';
            } else {
                passwordHint.textContent = '';
            }
        });

        // Form submission
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            // Validation for sign-up mode
            if (isSignUpMode) {
                if (!username.includes('@')) {
                    messageEl.textContent = 'Please enter a valid email address';
                    messageEl.className = 'message error';
                    return;
                }
                if (password.length < 6) {
                    messageEl.textContent = 'Password must be at least 6 characters';
                    messageEl.className = 'message error';
                    return;
                }
            }

            // Loading state
            const originalText = submitBtn.textContent;
            submitBtn.innerHTML = `<span class="loader"></span> ${isSignUpMode ? 'Creating Account...' : 'Signing In...'}`;
            submitBtn.disabled = true;
            messageEl.textContent = '';
            messageEl.className = 'message';

            try {
                const endpoint = isSignUpMode ? '/api/register' : '/api/login';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                let data;
                const contentType = response.headers.get('content-type') || '';
                if (contentType.includes('application/json')) {
                    data = await response.json();
                } else {
                    const text = await response.text();
                    throw new Error(
                        `Server returned non-JSON response (${response.status}). ${text.slice(0, 120)}`
                    );
                }

                if (data.success) {
                    if (data.access_token) {
                        PhoenixAuth.saveAuthSession(data);
                    }

                    if (isSignUpMode && data.requiresConfirmation) {
                        messageEl.textContent = data.message || 'Account created. Please confirm your email, then sign in.';
                        messageEl.className = 'message success';
                        submitBtn.textContent = originalText;
                        submitBtn.disabled = false;
                        return;
                    }

                    messageEl.textContent = isSignUpMode
                        ? 'Account created successfully! Redirecting...'
                        : 'Login Successful! Redirecting...';
                    messageEl.classList.add('success');

                    if (isSignUpMode && data.access_token) {
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    } else if (isSignUpMode) {
                        setTimeout(() => {
                            isSignUpMode = false;
                            formTitle.textContent = 'Sign In';
                            submitBtn.textContent = 'Sign In';
                            switchText.textContent = 'New here?';
                            toggleModeLink.textContent = 'Create an account';
                            authForm.reset();
                            messageEl.textContent = 'Account created! Please sign in.';
                            messageEl.className = 'message success';
                            submitBtn.disabled = false;
                        }, 1500);
                    } else {
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    }
                } else {
                    throw new Error(data.message || (isSignUpMode ? 'Registration failed' : 'Login failed'));
                }
            } catch (err) {
                messageEl.textContent = err.message;
                messageEl.className = 'message error';
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
