    	function getParameterByName( name ){
    	    var regexS = '[\\?&]'+name+'=([^&#]*)',
    	  regex = new RegExp( regexS ),
    	  results = regex.exec( window.location.search );
    	  if( results == null ){
    	    return '';
    	  } else{
    	    return decodeURIComponent(results[1].replace(/\+/g, ' '));
    	  }
    	}

        function detectBrowserRefresh() {
            if (sessionStorage['isRefreshOrClose_hs']) {

                if (sessionStorage['isRefreshOrClose_hs'] === 'Y') {
                    sessionStorage['isRefreshOrClose_hs'] = 'N';
                    window.location.href = "./errorpages/refreshError.html";
                    return;
                } else {
                    initializeLoading.loadApplicationScript();
                    return;
                }
            } else {
                initializeLoading.loadApplicationScript();
                return;
            }

        }

        function initApplication(){
            detectBrowserRefresh();
        }

    </script>
