<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Score Results</title>
    <link rel="stylesheet" href="styles/score_result.css">
</head>
<body>
    <div class="score-container">
        <h1>Your Writing Task Results</h1>
        <div class="score-summary">
            <h2>Overall Score</h2>
            <div class="score-circle">
                <span class="score">__</span>
                <span class="scale">/30</span>
            </div>
            <p>Raw Score: __/5</p>
        </div>
        <div class="section-feedback">
            <h2>Feedback</h2>
            <p><strong>Strengths:</strong> __</p>
            <p><strong>Weaknesses:</strong> __</p>
            <p><strong>Suggestions for Improvement:</strong> __</p>
        </div>
        <button onclick="window.close()">Close</button>
    </div>
</body>
</html>
